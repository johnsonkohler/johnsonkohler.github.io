<html>
  <head>
    <style>
      p {
        display: inline-block;
      }
      input {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div><h2>Greek Forms - Dictionary Formatter</h2></div>
    <p>Last updated: 2026-03-15 18:54</p>

    <p>Save your work:</p>
    <input id="output" type="text">
    <button onclick="parse()">Parse</button>
    <p>(Remember to copy the text!)</p>
    <br>
    <p>Restore your work:</p>
    <input id="restore" type="text">
    <button onclick="restore()">Restore</button>
    <p>(This doesn't work yet.)</p>
    <br>

    <script>
const gender = ["m.", "f.", "n."]
const cases = ["nom."]
const person = ["1st", "2nd", "3rd"]
const number = ["sing.", "pl."]
const tense = ["pres.", "fut.", "imperf.", "aor."]
const voice = ["act.", "mid.", "pass."]
const mood = ["ind.", "imp.", "inf.", "part."]

const output = document.getElementById("output");
var pos = 0;

function parseInput(conjData) {
  const inputs = document.getElementsByName("box");
  output.value += "["; //subentry open

  //conjugation data

  output.value += "[";
  output.value += conjData;
  output.value += "], ";
  
  //word entry
  console.log(conjData + inputs[pos].value);

  output.value += "[";
  output.value += `"${inputs[pos].value}"`;
  pos++;
  output.value += "]";
  output.value += "], "; //subentry close
}

function parse() {
  output.value = "";
  output.value += "[";

  pos = 0;
  const inputs = document.getElementsByName("box");
  for (const m of mood) {
    for (const t of tense) {
      if (m != "ind." && t == "imperf.") continue; 
      for (const v of voice) {
        if (m == "inf.") {
          parseInput(`"", "", "", "", "${t}", "${v}", "inf."`);
        } else {
          for (const n of number) {
            if (m == "part.") {
              if (n == "pl.") continue;
              for (const g of gender) {
                parseInput(`"${g}", "nom.", "", "${n}", "${t}", "${v}", "part."`);
              }
            } else {
              for (const p of person) {
                if (m == "imp." && p != "2nd") continue;
                parseInput(`"", "", "${p}", "${n}", "${t}", "${v}", "${m}"`);      
              }
            }
          }
        }
      }
    }
  }
  //output.value -= ", ";
  output.value += "]";
}

function addFields() {
  const paragraph = document.body.appendChild(document.createElement("p"));
  const inp = document.body.appendChild(document.createElement("input"));
  inp.setAttribute("name", "box");
  inp.setAttribute("onkeyup", "parse()");
  const br = document.body.appendChild(document.createElement("br"));
  return paragraph;
}
      
function setup() {
  var uses = 0;
  for (const m of mood) {
    for (const t of tense) {
      if (m != "ind." && t == "imperf.") continue;
      for (const v of voice) {
        if (m == "inf.") {
          addFields().innerText = `${t} ${v} inf.`;
        } else {
          for (const n of number) {
            if (m == "part.") {
              if (n == "pl.") continue;
              for (const g of gender) {
                addFields().innerText = `${g} ${n} ${t} ${v} part.`;
                uses++;
              }
            } else {
              for (const p of person) {
                if (m == "imp." && p != "2nd") continue;
                addFields().innerText = `${p} ${n} ${t} ${v} ${m}`;
                uses++;
      
              }
            }
          }
        }
      }
    }
  }
  console.log(uses)
}

setup();
    </script>
  </body>
</html>
