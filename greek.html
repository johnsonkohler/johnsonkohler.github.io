<html>
  <head>
    <meta charset="UTF-8">
    <title>Greek Forms</title>
    <link rel="stylesheet" href="greek.css">
    <style>
      .invisible {
        display: none;
      }
    </style>
  </head>

  <body>
    <form>
      <p id="promptWord">[Loading...]</p>
      <p id="promptForm">[Loading...]</p>
      <input name="answerBox" type="text">
      <input name="answerBox" type="hidden">
      <input name="answerBox" type="hidden">
      <input id="submitButton" type="submit" value="Check" onclick="event.preventDefault(); checkAnswer();">
      <button id="addFieldButton" onclick="event.preventDefault(); addField()">Add</button>
    </form>

    <p id="feedback">Conjugate the verb above in the form provided.</p>

    <p>(If the app is buffering for more than a second, that's not normal.)</p>

    <p style="display: inline-block;">Change mode:</p>
    <button onclick="setting = 0; wordUses = 0; newQuestionSettingOne();">Conjugate words</button>
    <button onclick="setting = 1; newQuestionSettingOne();">Parse words</button>

    <button onclick="document.getElementById('toggles').classList.toggle('invisible');">Choose verbs</button>
    <div id="toggles" style="display: none;"></div>
    
    <p>Last updated: 2026-03-26 17:20 </p>

    <script src="greek.js" type="text/javascript"></script>

  </body>
</html>
